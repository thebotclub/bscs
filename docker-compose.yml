services:
  bscs-gateway:
    container_name: bscs-gateway
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - ${BSCS_CONFIG_PATH:-/home/hani/.config/bscs}:/root/.config/bscs:ro
    command: node dist/bin/bscs.js gateway start --port 18999 --bind 0.0.0.0
    ports:
      - "127.0.0.1:18999:18999"
    restart: unless-stopped
    networks:
      - bscs-net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:18999/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  bscs-net:
    external: true
