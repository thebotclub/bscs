# HQ-specific override for deploying BSCS gateway on the HQ machine.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.hq.yml up -d
#
# Prerequisite — create the network once before first deploy:
#   docker network create bscs-net
#
# If the network needs custom options (e.g. MTU for UDM VLAN):
#   docker network create --opt com.docker.network.driver.mtu=1500 bscs-net

services:
  bscs-gateway:
    # HQ uses the locally-built image from the Dockerfile in this repo.
    # Build it first: docker build -t bscs-gateway:latest .
    image: bscs-gateway:latest
    # Override the volume mount — use the built dist, not a live bind-mount
    volumes:
      - /home/hani/.config/bscs:/root/.config/bscs:ro

networks:
  bscs-net:
    external: true
    # If bscs-net doesn't exist yet, create it:
    # docker network create bscs-net
